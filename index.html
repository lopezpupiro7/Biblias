<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Lectura Bíblica Anual</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <style>
        /* Estilos específicos para que al imprimir o guardar en PDF salga perfecto, ocultando la interfaz del buscador */
        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; }
            .page-break { page-break-after: always; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased selection:bg-blue-500 selection:text-white">

    <!-- CONTENIDO INTERACTIVO (Se oculta automáticamente al generar el PDF Anual) -->
    <div class="max-w-6xl mx-auto px-4 py-8 no-print">
        <header class="text-center mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 tracking-tight">
                CAPITULOS DEL DEL DIA
            </h1>
            <p class="text-slate-400 mt-2 font-medium tracking-wide uppercase text-sm">A Través de la Biblia en un Año</p>
            <blockquote class="text-xs italic text-slate-500 mt-3 max-w-xl mx-auto bg-slate-950/40 p-3 rounded-xl border border-slate-800/60">
                “Vivir como una familia unánime que glorifica a Jesucristo ganando almas para que se conviertan en miembros maduros y ministros fieles”
            </blockquote>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- PANEL IZQUIERDO: Selectores -->
            <div class="bg-slate-850 p-6 rounded-2xl border border-slate-800 shadow-xl flex flex-col justify-between space-y-6">
                <div>
                    <h2 class="text-lg font-bold text-blue-400 mb-4 flex items-center gap-2"><span>📅</span> Buscador de Fecha</h2>
                    
                    <!-- Formato Fecha Nativo -->
                    <div class="mb-4 p-4 bg-slate-900/60 rounded-xl border border-slate-800">
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2 tracking-wider">Opción 1: Calendario / Fecha</label>
                        <input type="date" id="inputFechaCompleta" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-center font-bold text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                    </div>

                    <div class="text-center text-xs font-bold text-slate-600 my-2">O BIEN</div>

                    <!-- Meses con Nombre -->
                    <div class="p-4 bg-slate-900/60 rounded-xl border border-slate-800 space-y-4">
                        <label class="block text-xs font-semibold uppercase text-slate-400 tracking-wider">Opción 2: Listas Desplegables</label>
                        <div>
                            <select id="selectMes" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white cursor-pointer">
                                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                                <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                                <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                            </select>
                        </div>
                        <div>
                            <select id="selectDia" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white cursor-pointer"></select>
                        </div>
                    </div>
                </div>

                <!-- BOTÓN CORREGIDO PARA GENERAR EL PLAN ANUAL COMPLETO EN PDF -->
                <button onclick="window.print()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-950/40 transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer">
                    <span>📄</span> Descargar Plan Anual Completo (PDF)
                </button>
            </div>

            <!-- PANEL DERECHO: Tarjeta de Resultado con Espacio de Reflexión -->
            <div class="lg:col-span-2 bg-gradient-to-br from-slate-850 to-slate-900 p-8 rounded-2xl border border-slate-800 shadow-xl flex flex-col items-center justify-start text-center min-h-[300px]">
                <span class="text-xs font-bold uppercase tracking-widest text-indigo-400 bg-indigo-950/60 px-4 py-1.5 rounded-full border border-indigo-900/50">Lectura del Día</span>
                <h3 class="text-4xl md:text-5xl font-black text-white mt-4 mb-2 tracking-tight" id="resultadoLectura">Gn. 1-2</h3>
                <p class="text-slate-400 text-sm font-medium mb-6" id="resultadoFecha">Cargando...</p>
                
                <!-- 🌟 NUEVO ESPACIO: REFLEXIÓN DEVOCIONAL ASOCIADA -->
                <div class="w-full text-left bg-slate-900/40 border border-slate-800/80 rounded-xl p-5 mt-2">
                    <h4 class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-2 flex items-center gap-1.5">
                        <span>💡</span> Reflexión 
                    </h4>
                    <p class="text-slate-300 text-sm leading-relaxed italic" id="resultadoReflexion">
                        
                    </p>
                </div>

                <!-- 🌟 NUEVO ESPACIO INTERACTIVO: NOTAS PERSONALES -->
                <div class="w-full text-left mt-4">
                    <label class="block text-[11px] font-semibold uppercase text-slate-500 mb-1.5 tracking-wider">
                        📝 Mis Notas y Meditación Personal:
                    </label>
                    <textarea id="notasUsuario" rows="3" 
                              class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-300 focus:outline-none focus:border-emerald-500/50 transition-all placeholder:text-slate-600 resize-none"
                              placeholder="Escribe aquí lo que Dios habla a tu vida hoy..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- ÁREA DE IMPRESIÓN (Oculta en pantalla, contiene TODO el año completo para el PDF) -->
    <div class="hidden print-area p-4 text-slate-900 bg-white">
        <div id="tablas-impresion-container"></div>
    </div>

    <script>

            5: ["Sal. 61-63", "Sal. 64-66", "Sal. 67-69", "Sal. 70-72", "Sal. 73-75", "Sal. 76-78", "Sal. 79-81", "Sal. 82-84", "Sal. 85-87", "Sal. 88-90", "Sal. 91-93", "Sal. 94-96", "Sal. 97-99", "Sal. 100-102", "Sal. 103-105", "Sal. 106-108", "Sal. 109-111", "Sal. 112-114", "Sal. 115-118", "Sal. 119", "Sal. 120-123", "Sal. 124-126", "Sal. 127-129", "Sal. 130-132", "Sal. 133-135", "Sal. 136-138", "Sal. 139-141", "Sal. 142-144", "Sal. 145-147", "Sal. 148-150", "1 R. 1-4"],
            6: ["Pr. 1-3", "Pr. 4-7", "Pr. 8-11", "Pr. 12-14", "Pr. 15-18", "Pr. 19-21", "Pr. 22-24", "Pr. 25-28", "Pr. 29-31", "Ec. 1-3", "Ec. 4-6", "Ec. 7-9", "Ec. 10-12", "Cnt. 1-4", "Cnt. 5-8", "1 R. 5-7", "1 R. 8-10", "1 R. 11-13", "1 R. 14-16", "1 R. 17-19", "1 R. 20-22", "2 R. 1-3", "2 R. 4-6", "2 R. 7-10", "2 R. 11-14:20", "Jl. 1-3", "2 R. 14:21-25; Jon. 1-4", "2 R. 14:26-29; Am. 1-3", "Am. 4-6", "Am. 7-9", ""],
            7: ["2 R. 15-17", "Os. 1-4", "Os. 5-7", "Os. 8-10", "Os. 11-14", "2 R. 18-19", "Is. 1-3", "Is. 4-6", "Is. 7-9", "Is. 10-12", "Is. 13-15", "Is. 16-18", "Is. 19-21", "Is. 22-24", "Is. 25-27", "Is. 28-30", "Is. 31-33", "Is. 34-36", "Is. 37-39", "Is. 40-42", "Is. 43-45", "Is. 46-48", "Is. 49-51", "Is. 52-54", "Is. 55-57", "Is. 58-60", "Is. 61-63", "Is. 64-66", "Mi. 1-4", "Mi. 5-7", "Nah. 1-3"],
            8: ["2 R. 20-21", "Sof. 1-3", "Hab. 1-3", "2 R. 22-25", "Abd.; Jer. 1-2", "Jer. 3-5", "Jer. 6-8", "Jer. 9-12", "Jer. 13-16", "Jer. 17-20", "Jer. 21-23", "Jer. 24-26", "Jer. 27-29", "Jer. 30-32", "Jer. 33-36", "Jer. 37-39", "Jer. 40-42", "Jer. 43-46", "Jer. 47-49", "Jer. 50-52", "Lam. 1-5", "1 Cr. 1-3", "1 Cr. 4-6", "1 Cr. 7-9", "1 Cr. 10-13", "1 Cr. 14-16", "1 Cr. 17-19", "1 Cr. 20-23", "1 Cr. 24-26", "1 Cr. 27-29", "2 Cr. 1-3"],
            9: ["2 Cr. 4-6", "2 Cr. 7-9", "2 Cr. 10-13", "2 Cr. 14-16", "2 Cr. 17-19", "2 Cr. 20-22", "2 Cr. 23-25", "2 Cr. 26-29", "2 Cr. 30-32", "2 Cr. 33-36", "Ez. 1-3", "Ez. 4-7", "Ez. 8-11", "Ez. 12-14", "Ez. 15-18", "Ez. 19-21", "Ez. 22-24", "Ez. 25-27", "Ez. 28-30", "Ez. 31-33", "Ez. 34-36", "Ez. 37-39", "Ez. 40-42", "Ez. 43-45", "Ez. 46-48", "Dn. 1-3", "Dn. 4-6", "Dn. 7-9", "Dn. 10-12", "Esd. 1-3", ""],
            10: ["Esd. 4-7", "Esd. 8-10", "Neh. 1-3", "Hag. 1-2", "Zac. 1-3", "Zac. 4-7", "Zac. 8-11", "Esd. 5-7", "Esd. 8-10", "Neh. 1-3", "Neh. 4-6", "Neh. 7-9", "Neh. 10-13", "Mal. 1-4", "Mat. 1-4", "Mat. 5-7", "Mat. 8-11", "Mat. 12-15", "Mat. 16-19", "Mat. 20-22", "Mat. 23-25", "Mat. 26-28", "Mar. 1-3", "Mar. 4-6", "Mar. 7-10", "Mar. 11-13", "Mar. 14-16", "Lc. 1-3", "Lc. 4-6", "Lc. 7-9", "Lc. 10-13"],

            12: ["Ro. 5-8", "Ro. 9-11", "Ro. 12-16", "Hch. 20:3-22", "Hch. 23-25", "Hch. 26-28", "Ef. 1-3", "Ef. 4-6", "Fil. 1-4", "Col. 1-4", "He. 1-4", "He. 5-7", "He. 8-10", "He. 11-13", "Flm.; 1 P. 1-2", "1 P. 3-5", "2 P. 1-3", "1 Ti. 1-3", "1 Ti. 4-6", "Tit. 1-3", "2 Ti. 1-4", "1 Jn. 1-2", "1 Jn. 3-5", "2 Jn.; 3 Jn.; Jud.", "Ap. 1-3", "Ap. 4-6", "Ap. 7-9", "Ap. 10-12", "Ap. 13-15", "Ap. 16-18", "Ap. 19-22"]
        };

        const inputFechaCompleta = document.getElementById('inputFechaCompleta');
        const selectMes = document.getElementById('selectMes');
        const selectDia = document.getElementById('selectDia');
        const resultadoLectura = document.getElementById('resultadoLectura');
        const resultadoFecha = document.getElementById('resultadoFecha');
        const resultadoReflexion = document.getElementById('resultadoReflexion');
        const notasUsuario = document.getElementById('notasUsuario');

        // 🌟 GENERADOR INTELIGENTE DE REFLEXIONES DEVOCIONALES
        function generarReflexionInterna(lectura, nombreMes, dia) {
           
          return "Si somos orgullosos al momento de ser humillados no encontraremos paz, los que" +
             " somos amantes del pecado, llenos de queja u ira somos humillados, perdemos y ante Dios "+
              "no encontramos bendición, el egoísta, el insensato, el injusto no tiene a Dios y es Dios quién juzgará nuestros actos."+
              
              "Dios es nuestro protector, y su palabra es limpia, creador del todo, es mejor tener lo necesario que" +
              " llegar a tener y hablar contra Dios, Dios aborrece el orgullo y la altivez, Dios nos dio amor y el amor es humilde. "+
              "Quien no lleve amor no sabe ser humilde.";
          
      }

        function actualizarDiasDisponibles() {
            const mesSelected = parseInt(selectMes.value);
            const diasEnMes = diccionarioLecturas[mesSelected].length;
            const diaAnterior = parseInt(selectDia.value) || 1;
            
            selectDia.innerHTML = "";
            for (let i = 1; i <= diasEnMes; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `Día ${i}`;
                selectDia.appendChild(opt);
            }
            selectDia.value = diaAnterior <= diasEnMes ? diaAnterior : 1;
        }

        function renderizarLectura(dia, mes) {
            const nombreMes = mesesNombres[mes - 1];
            const lectura = diccionarioLecturas[mes][dia - 1];

            // Limpiar o recuperar las notas para ese día específico si se desea (opcional)
            notasUsuario.value = ""; 

            if (!lectura || lectura.trim() === "") {
                resultadoLectura.innerText = "☕ Reflexión Libre";
                resultadoFecha.innerText = `Día de descanso en ${nombreMes}`;
                resultadoReflexion.innerText = generarReflexionInterna("", nombreMes, dia);
            } else {
                resultadoLectura.innerText = lectura;
                resultadoFecha.innerText = `Lectura para el día ${dia} de ${nombreMes}`;
                resultadoReflexion.innerText = generarReflexionInterna(lectura, nombreMes, dia);
            }
        }

        inputFechaCompleta.addEventListener('change', function() {
            if (this.value) {
                const parts = this.value.split('-');
                const mes = parseInt(parts[1]);
                const dia = parseInt(parts[2]);
                selectMes.value = mes;
                actualizarDiasDisponibles();
                selectDia.value = dia;
                renderizarLectura(dia, mes);
            }
        });

        document.getElementById('inputFechaCompleta')

        function actualizarDesdeSelects() {
            const mes = parseInt(selectMes.value);
            const dia = parseInt(selectDia.value);
            const añoBase = new Date().getFullYear();
            inputFechaCompleta.value = `${añoBase}-${mes < 10 ? '0'+mes : mes}-${dia < 10 ? '0'+dia : dia}`;
            renderizarLectura(dia, mes);
        }

        selectMes.addEventListener('change', () => { actualizarDiasDisponibles(); actualizarDesdeSelects(); });
        selectDia.addEventListener('change', actualizarDesdeSelects);

        // AQUÍ CONSTRUIMOS EL REPORTE ANUAL COMPLETO (LOS 12 MESES) PARA EL PDF
        function inicializarTablasImpresion() {
            const container = document.getElementById('tablas-impresion-container');
            
            let html = `<div style="text-align: center; margin-bottom: 20px;">
                <h1 style="color: #1b365d; font-size: 24px; font-weight: bold;">Iglesia Evangélica Pentecostal Salem</h1>
                <p style="font-size: 12px; font-weight: bold; text-transform: uppercase; color: #4a5568;">Plan Anual Completo de Lectura Cronológica</p>
                <p style="font-size: 10px; italic; color: #718096; max-w: 600px; margin: 5px auto;">“Vivir como una familia unánime que glorifica a Jesucristo ganando almas para que se conviertan en miembros maduros y ministros fieles”</p>
            </div>`;

            // SECCIÓN 1er Semestre: Enero a Junio
            html += `<h2 style="color: #1b365d; border-bottom: 2px solid #1b365d; margin-top: 20px; font-size: 14px; font-weight: bold;">PRIMER SEMESTRE (ENERO - JUNIO)</h2>
            <table style="width: 100%; border-collapse: collapse; font-size: 9px; margin-top: 5px; margin-bottom: 30px;">
                <thead><tr style="background-color: #1b365d; color: white;"><th style="border: 1px solid #cbcbcb; padding: 4px; text-align: center; width: 5%;">Día</th>`;
            for(let i=0; i<6; i++) html += `<th style="border: 1px solid #cbcbcb; padding: 4px; text-align: center; width: 15.8%;">${mesesNombres[i].toUpperCase()}</th>`;
            html += `</tr></thead><tbody>`;
            for(let d=0; d<31; d++){
                html += `<tr ${d%2===1?'style="background-color: #f4f7fa;"':''}><td style="border: 1px solid #cbcbcb; padding: 3px; text-align: center; font-weight: bold;">${d+1}</td>`;
                for(let m=1; m<=6; m++) html += `<td style="border: 1px solid #cbcbcb; padding: 3px; text-align: center;">${diccionarioLecturas[m][d] || ""}</td>`;
                html += `</tr>`;
            }
            html += `</tbody></table><div class="page-break"></div>`;

            // SECCIÓN 2do Semestre: Julio a Diciembre
            html += `<div style="text-align: center; margin-bottom: 20px;" class="print-only-header">
                <h1 style="color: #1b365d; font-size: 24px; font-weight: bold;">Iglesia Evangélica Pentecostal Salem</h1>
            </div>
            <h2 style="color: #1b365d; border-bottom: 2px solid #1b365d; margin-top: 10px; font-size: 14px; font-weight: bold;">SEGUNDO SEMESTRE (JULIO - DICIEMBRE)</h2>
            <table style="width: 100%; border-collapse: collapse; font-size: 9px; margin-top: 5px;">
                <thead><tr style="background-color: #1b365d; color: white;"><th style="border: 1px solid #cbcbcb; padding: 4px; text-align: center; width: 5%;">Día</th>`;
            for(let i=6; i<12; i++) html += `<th style="border: 1px solid #cbcbcb; padding: 4px; text-align: center; width: 15.8%;">${mesesNombres[i].toUpperCase()}</th>`;
            html += `</tr></thead><tbody>`;
            for(let d=0; d<31; d++){
                html += `<tr ${d%2===1?'style="background-color: #f4f7fa;"':''}><td style="border: 1px solid #cbcbcb; padding: 3px; text-align: center; font-weight: bold;">${d+1}</td>`;
                for(let m=7; m<=12; m++) html += `<td style="border: 1px solid #cbcbcb; padding: 3px; text-align: center;">${diccionarioLecturas[m][d] || ""}</td>`;
                html += `</tr>`;
            }
            html += `</tbody></table>`;

            container.innerHTML = html;
        }

        // Carga inicial sincronizada
        const hoy = new Date();
        selectMes.value = hoy.getMonth() + 1;
        actualizarDiasDisponibles();
        selectDia.value = hoy.getDate();
        actualizarDesdeSelects();
        inicializarTablasImpresion();
    </script>
</body>
</html>
